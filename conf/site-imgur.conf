#   imgur-com Start
upstream imgur-com {
	zone imgur-com 1m;
	least_conn;
	server [2a04:4e42:200::193]:443;
	server [2a04:4e42:400::193]:443;
	server [2a04:4e42:600::193]:443;
	server [2a04:4e42::193]:443;
	server [2a04:4e42:7b::193]:443;
	server [2a04:4e42:107b::193]:443;
	server [2a04:4e42:fdf::193]:443;
	server 167.82.0.193:443;
	server 167.82.20.193:443;
	server 167.82.28.193:443;
	server 167.82.84.193:443;
	server 167.82.88.193:443;
	server 167.82.92.193:443;
	server 167.82.104.193:443;

	server 146.75.112.193:443;
	server 146.75.48.193:443;
	server 146.75.44.193:443;
	server 146.75.20.193:443;

	server 151.101.0.193:443;
	server 151.101.64.193:443;
	server 151.101.76.193:443;
	server 151.101.88.193:443;
	server 151.101.108.193:443;
	server 151.101.128.193:443;
	server 151.101.192.193:443;
	#server 151.101.228.193:443;

	server 199.232.44.193:443;
	server 199.232.104.193:443;
	server 199.232.112.193:443;
	server 199.232.148.193:443;
	server 199.232.164.193:443;
	server 199.232.208.193:443;
	server 199.232.212.193:443;
	server 199.232.216.193:443;
	server 199.232.232.193:443;
	server 199.232.240.193:443;
	keepalive 32;
	keepalive_time 1h;
	keepalive_timeout 300s;
	keepalive_requests 10000;
}

server {
	listen 443 ssl http2;
	listen [::]:443 ssl http2;
	server_name imgur.com;
	server_name *.imgur.com;

	include cert.conf;
	client_max_body_size 50M;

	location / {
		proxy_pass https://imgur-com;
		proxy_buffer_size  64k;
		proxy_buffers   32 64k;
		proxy_busy_buffers_size 128k;
		include shared-proxy-params-empty-sni.conf;
		proxy_next_upstream error timeout http_429 http_500 http_502 http_503 http_504 non_idempotent;

	}
}
#   imgur-com End
