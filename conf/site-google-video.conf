log_format  GoogleVideo  '［$time_local］－	请求耗时"$request_time"	$http_host	服务器地址：	$proxy_host	$server_protocol\n	上游状态	"$upstream_status"	上游地址：	"$upstream_addr"\n	$status	总字节数$body_bytes_sent';

#　　GoogleVideo.com
split_clients $connection $domain_SUFFIX {
	20%   "gvt1.com";
	26%   "xn--ngstr-lra8j.com";
	20%   "bdn.dev";
	4%   "c.2mdn.net";
	4%   "snap.gvt1.com";
#	3%   "gcpcdn.gvt1.com";
	4%   "offline-maps.gvt1.com";
#	20%   "c.bigcache.googleapis.com";
	22%   "c.googlesyndication.com";
}
server {
	listen 443 ssl http2;
	listen [::]:443 ssl http2;
	server_name *.googlevideo.com;

	include cert.conf;
	access_log logs/GoogleVideo-access.log lite buffer=256;
	error_log logs/GoogleVideo-error.log;

	location / {
		proxy_max_temp_file_size 0;
		resolver 119.29.29.29:53 valid=1h ipv4=off ipv6=on;
		if ( $http_host ~ (([\S\s]*).googlevideo.com) ){
		  proxy_pass https://$2.${domain_SUFFIX}:443;#$2是匹配上的变量部分
		}
		proxy_ssl_name $proxy_host;
		proxy_set_header Range $http_range;
		proxy_set_header If-Range $http_if_range;
		proxy_connect_timeout 5;
		proxy_set_header Connection "";
		proxy_http_version 1.1;
		proxy_set_header Host $http_host;
		proxy_set_header User-Agent $http_user_agent;
		proxy_buffering off;
		proxy_ssl_server_name on;
		proxy_ssl_session_reuse on;

		keepalive_timeout 600;
		keepalive_requests 100000;
	}
}
#	GoogleVideo End


#　　ggpht.com
upstream ggpht-com {
	hash $connection consistent;
	#server [2607:f8b0:4002:c10::84]:443 weight=2;
	server [2607:f8b0:4001:c10::84]:443 weight=2;
	server [2607:f8b0:4001:c10::80]:443 weight=2;
	#server [2800:3f0:4005:418::2001]:443 weight=2;
	server 34.49.13.3:443 weight=1;
	keepalive 4;	
	keepalive_timeout 120;
	keepalive_requests 10000;
}
server {
	listen 443 ssl http2;
	listen [::]:443 ssl http2;
	server_name *.ggpht.com;
	server_name photos-ugc.l.googleusercontent.com;
	server_name *.ytimg.com;

	include cert.conf;
	access_log off;
	#access_log logs/GoogleVideo-access.log lite buffer=256;
	error_log logs/GoogleVideo-error.log;

	location / {
		proxy_pass https://ggpht-com;
		proxy_next_upstream error timeout http_403 http_404 http_429 http_500 http_502 http_503 http_504 non_idempotent;
		proxy_next_upstream_timeout 30;
		proxy_ssl_name "g.cn";
		proxy_ssl_session_reuse on;
		include shared-proxy-params-1.conf;
		proxy_set_header Range $http_range;
		proxy_set_header If-Range $http_if_range;
	}
}